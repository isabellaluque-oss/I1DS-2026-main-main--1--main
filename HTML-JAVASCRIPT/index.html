<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini sistema</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

<div class="container">
    
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>Sistema</h2>
        <a href="#">Dashboard</a>
        <a href="#">Cadastros</a>
        <a href="#">Relatorios</a>
    </aside>

    <!-- CONTEÚDO -->
    <main class="content">
        <h1>Cadastro</h1>

        <!-- FORMULÁRIO -->
        <section class="card">
            <form onsubmit="cadastrar(event)">
                <input type="text" id="nome" placeholder="Digite seu nome..." />
                <input type="email" id="email" placeholder="Digite seu email..." />
                <button type="submit">Enviar</button>
            </form>
        </section>

        <!-- LISTA -->
        <section class="card">
            <ul id="lista"></ul>
        </section>

    </main>

</div>

<script src="js/script.js"></script>

</body>
</html>
